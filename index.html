<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OrcaX - Dive in the Digital Ocean.</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <!-- 引入GSAP库 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.11.4/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.11.4/MotionPathPlugin.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=Space+Grotesk:wght@300;400;600;700&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Space Grotesk', sans-serif;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 25%, #16213e 50%, #0f3460 75%, #533483 100%);
            background-size: 400% 400%;
            animation: oceanFlow 15s ease infinite;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }
        
        @keyframes oceanFlow {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        
        /* 几何图形背景 */
        .geometric-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }
        
        .geometric-shape {
            position: absolute;
            border: 2px solid rgba(0, 255, 255, 0.1);
            animation: float 20s infinite linear;
        }
        
        .shape-1 {
            width: 100px;
            height: 100px;
            top: 10%;
            left: 10%;
            animation-delay: 0s;
            transform: rotate(45deg);
        }
        
        .shape-2 {
            width: 150px;
            height: 150px;
            top: 60%;
            right: 15%;
            animation-delay: -5s;
            border-radius: 50%;
        }
        
        .shape-3 {
            width: 80px;
            height: 80px;
            bottom: 20%;
            left: 20%;
            animation-delay: -10s;
            clip-path: polygon(50% 0%, 0% 100%, 100% 100%);
        }
        
        .shape-4 {
            width: 120px;
            height: 120px;
            top: 30%;
            right: 30%;
            animation-delay: -15s;
            transform: rotate(30deg);
        }
        
        @keyframes float {
            0% { transform: translateY(0px) rotate(0deg); opacity: 0.3; }
            50% { transform: translateY(-20px) rotate(180deg); opacity: 0.1; }
            100% { transform: translateY(0px) rotate(360deg); opacity: 0.3; }
        }
        
        /* 主容器 */
        .main-container {
            position: relative;
            z-index: 10;
            text-align: center;
            padding: 2rem;
            pointer-events: none;
        }
        
        /* Distortion canvas — 铺满背景 */
        #distortion-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100% !important;
            height: 100% !important;
            z-index: 3;
            pointer-events: auto;
        }

        .subtitle {
            font-family: 'Space Grotesk', sans-serif;
            font-size: clamp(0.9rem, 2.5vw, 1.6rem);
            font-weight: 400;
            color: rgba(255, 255, 255, 0.6);
            margin-bottom: 3rem;
            animation: subtitleFade 2s ease-out;
            letter-spacing: 0.3em;
            text-transform: uppercase;
        }

        @keyframes subtitleFade {
            0% { opacity: 0; transform: translateY(30px); }
            100% { opacity: 1; transform: translateY(0); }
        }
        
        /* SVG容器 */
        .svg-container {
            position: relative;
            display: inline-block;
            filter: drop-shadow(0 0 30px rgba(0, 212, 255, 0.3));
            animation: svgPulse 4s ease-in-out infinite;
        }
        
        @keyframes svgPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        
        svg {
            max-width: 100%;
            max-height: 60vh;
            transition: all 0.3s ease;
        }
        
        svg:hover {
            filter: drop-shadow(0 0 50px rgba(0, 212, 255, 0.6));
            transform: scale(1.02);
        }
        
        /* 粒子效果 */
        .particles {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 2;
        }
        
        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: rgba(0, 255, 255, 0.6);
            border-radius: 50%;
            animation: particleFloat 15s infinite linear;
        }
        
        @keyframes particleFloat {
            0% { transform: translateY(100vh) translateX(0px); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-100vh) translateX(100px); opacity: 0; }
        }
        
        /* 初始化样式 */
        #elements path {
            stroke-dasharray: 1;
            stroke-dashoffset: 1;
            opacity: 0;
        }
        
        #logo {
            opacity: 0;
        }
        
        /* 响应式设计 */
        @media (max-width: 768px) {
            .subtitle {
                font-size: clamp(0.7rem, 3vw, 1rem);
                letter-spacing: 0.15em;
            }

            svg {
                max-height: 40vh;
            }
        }
    </style>
</head>

    <script>
        // 创建粒子效果
        function createParticles() {
            const particlesContainer = document.getElementById('particles');
            const particleCount = 50;
            
            for (let i = 0; i < particleCount; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.animationDelay = Math.random() * 15 + 's';
                particle.style.animationDuration = (Math.random() * 10 + 10) + 's';
                particlesContainer.appendChild(particle);
            }
        }
        
        // 等待页面加载完成
        document.addEventListener('DOMContentLoaded', function() {
            // 创建粒子
            createParticles();
            
            // 注册插件
            gsap.registerPlugin(MotionPathPlugin);
            
            // 获取元素
            const elements = document.querySelectorAll('#elements path');
            const logo = document.getElementById('logo');
            
            // 创建时间线
            const tl = gsap.timeline({
                defaults: {
                    ease: 'power2.inOut',
                    duration: 1.5
                }
            });
            
            // 1. 空白画面（保持短暂时间）
            tl.to({}, { duration: 0.5 });
            
            // 2. 逐一绘制基础元素
            elements.forEach((path, index) => {
                // 获取路径长度用于动画
                const pathLength = path.getTotalLength();
                
                // 设置路径的stroke-dasharray和stroke-dashoffset
                path.style.strokeDasharray = pathLength;
                path.style.strokeDashoffset = pathLength;
                path.style.opacity = '1';
                
                // 添加绘制动画
                tl.to(path, {
                    strokeDashoffset: 0,
                    duration: 1.5,
                    ease: 'power3.inOut',
                    delay: index * -0.5 // 每个元素之间的延迟
                });
            });
            
            // 3. logo渐渐显现
            tl.to(logo, {
                opacity: 1,
                duration: 2.5,
                ease: "sine.inOut" 
            }); // 与上一个动画重叠0.5秒
            
            // 4. 最后隐藏基础元素
            tl.to('#elements', {
                opacity: 0,
                duration: 2.5,
                ease: "sine.inOut"
            }, "-=2.5");
            
            // 添加额外的动画效果
            // 副标题动画
            gsap.fromTo('.subtitle', 
                { opacity: 0, y: 30 },
                { opacity: 1, y: 0, duration: 1.5, ease: "power2.out", delay: 1.5 }
            );
            
            // SVG容器动画
            gsap.fromTo('.svg-container', 
                { opacity: 0, scale: 0.8 },
                { opacity: 1, scale: 1, duration: 2, ease: "power2.out", delay: 2 }
            );
        });
        
        // 添加鼠标移动视差效果
        document.addEventListener('mousemove', (e) => {
            const mouseX = e.clientX / window.innerWidth;
            const mouseY = e.clientY / window.innerHeight;
            
            // 为几何图形添加轻微视差
            const shapes = document.querySelectorAll('.geometric-shape');
            shapes.forEach((shape, index) => {
                const speed = (index + 1) * 0.5;
                const x = (mouseX - 0.5) * speed * 20;
                const y = (mouseY - 0.5) * speed * 20;
                shape.style.transform += ` translate(${x}px, ${y}px)`;
            });
            
        });
        
        // 添加点击波纹效果
        document.addEventListener('click', (e) => {
            const ripple = document.createElement('div');
            ripple.style.position = 'absolute';
            ripple.style.left = e.clientX + 'px';
            ripple.style.top = e.clientY + 'px';
            ripple.style.width = '0px';
            ripple.style.height = '0px';
            ripple.style.background = 'rgba(0, 255, 255, 0.6)';
            ripple.style.borderRadius = '50%';
            ripple.style.transform = 'translate(-50%, -50%)';
            ripple.style.pointerEvents = 'none';
            ripple.style.animation = 'ripple 0.6s ease-out';
            
            document.body.appendChild(ripple);
            
            setTimeout(() => {
                ripple.remove();
            }, 600);
        });
        
        // 添加波纹动画样式
        const style = document.createElement('style');
        style.textContent = `
            @keyframes ripple {
                0% { width: 0; height: 0; opacity: 1; }
                100% { width: 100px; height: 100px; opacity: 0; }
            }
        `;
        document.head.appendChild(style);

        // ── 像素扭曲效果 (Canvas 2D) ──
        (function () {
            const canvas = document.getElementById('distortion-canvas');
            const ctx = canvas.getContext('2d');

            const isMobile = 'ontouchstart' in window || window.innerWidth < 768;
            const CELL = isMobile ? 5 : 8;           // 移动端更细的网格
            const MOUSE_RADIUS = isMobile ? 80 : 120; // 移动端较小的影响半径
            const EASE_BACK = 0.08;                    // 回弹速度
            const SCATTER = isMobile ? 18 : 25;       // 最大散开距离

            let cols, rows, grid;
            let mouse = { x: -9999, y: -9999 };
            let touchTimeout = null;

            // 渲染隐藏文字到离屏 canvas，返回像素数据
            function buildTextTexture(w, h) {
                const off = document.createElement('canvas');
                off.width = w;
                off.height = h;
                const oc = off.getContext('2d');

                // 绘制 "ORCAX" 文字 — 居中偏上
                oc.fillStyle = '#000';
                oc.fillRect(0, 0, w, h);

                const fontSize = Math.min(w * 0.15, h * 0.25);
                oc.font = `800 ${fontSize}px Syne, sans-serif`;
                oc.textAlign = 'center';
                oc.textBaseline = 'middle';
                oc.fillStyle = '#fff';
                oc.fillText('ORCAX', w / 2, h * 0.22);

                return oc.getImageData(0, 0, w, h);
            }

            function initGrid() {
                const dpr = window.devicePixelRatio || 1;
                const displayW = window.innerWidth;
                const displayH = window.innerHeight;

                canvas.width = displayW * dpr;
                canvas.height = displayH * dpr;
                ctx.scale(dpr, dpr);

                cols = Math.ceil(displayW / CELL);
                rows = Math.ceil(displayH / CELL);

                const textData = buildTextTexture(cols, rows);
                grid = [];

                for (let r = 0; r < rows; r++) {
                    for (let c = 0; c < cols; c++) {
                        const idx = (r * cols + c) * 4;
                        const brightness = textData.data[idx]; // 0 = bg, 255 = text

                        let color;
                        if (brightness > 128) {
                            // 文字像素 — 青色调
                            const hue = 180 + Math.random() * 30;      // 180-210 (cyan–blue)
                            const sat = 70 + Math.random() * 30;
                            const lit = 50 + Math.random() * 20;
                            color = `hsl(${hue}, ${sat}%, ${lit}%)`;
                        } else {
                            // 背景像素 — 极微弱的暗色网格
                            const lit = 4 + Math.random() * 3;
                            color = `hsl(210, 15%, ${lit}%)`;
                        }

                        grid.push({
                            homeX: c * CELL,
                            homeY: r * CELL,
                            x: c * CELL,
                            y: r * CELL,
                            color: color,
                            isText: brightness > 128,
                            alpha: brightness > 128 ? 0 : 0.25,   // 文字默认隐藏，背景极淡
                            targetAlpha: brightness > 128 ? 0 : 0.25,
                        });
                    }
                }
            }

            function animate() {
                const displayW = window.innerWidth;
                const displayH = window.innerHeight;
                ctx.clearRect(0, 0, displayW, displayH);

                for (let i = 0; i < grid.length; i++) {
                    const p = grid[i];

                    // 计算鼠标距离
                    const dx = mouse.x - (p.homeX + CELL / 2);
                    const dy = mouse.y - (p.homeY + CELL / 2);
                    const dist = Math.sqrt(dx * dx + dy * dy);

                    if (dist < MOUSE_RADIUS) {
                        const force = (1 - dist / MOUSE_RADIUS);
                        const angle = Math.atan2(dy, dx);
                        // 散开：远离鼠标方向
                        const pushX = -Math.cos(angle) * force * SCATTER;
                        const pushY = -Math.sin(angle) * force * SCATTER;
                        p.x += (p.homeX + pushX - p.x) * 0.2;
                        p.y += (p.homeY + pushY - p.y) * 0.2;
                        // 鼠标附近 → 显示文字像素，隐藏背景像素
                        p.targetAlpha = p.isText ? (0.6 + force * 0.4) : (0.08 * (1 - force));
                    } else {
                        // 回归原位
                        p.x += (p.homeX - p.x) * EASE_BACK;
                        p.y += (p.homeY - p.y) * EASE_BACK;
                        p.targetAlpha = p.isText ? 0 : 0.25;
                    }

                    p.alpha += (p.targetAlpha - p.alpha) * 0.1;

                    if (p.alpha < 0.01) continue;

                    ctx.globalAlpha = p.alpha;
                    ctx.fillStyle = p.color;
                    ctx.fillRect(p.x, p.y, CELL - 1, CELL - 1);
                }

                ctx.globalAlpha = 1;
                requestAnimationFrame(animate);
            }

            // 鼠标事件
            canvas.addEventListener('mousemove', (e) => {
                mouse.x = e.clientX;
                mouse.y = e.clientY;
            });

            canvas.addEventListener('mouseleave', () => {
                mouse.x = -9999;
                mouse.y = -9999;
            });

            // 触摸事件 — 触摸结束后自动回弹
            canvas.addEventListener('touchmove', (e) => {
                const touch = e.touches[0];
                mouse.x = touch.clientX;
                mouse.y = touch.clientY;
                clearTimeout(touchTimeout);
            }, { passive: true });

            canvas.addEventListener('touchend', () => {
                // 延迟回弹，让用户看到扩散效果
                touchTimeout = setTimeout(() => {
                    mouse.x = -9999;
                    mouse.y = -9999;
                }, 300);
            });

            window.addEventListener('resize', () => {
                initGrid();
            });

            // 等字体加载后再初始化
            document.fonts.ready.then(() => {
                initGrid();
                animate();
            });
        })();
    </script>
</body>

</html>
