<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OrcaX - Dive in the Digital Ocean.</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <!-- 引入GSAP库 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.11.4/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.11.4/MotionPathPlugin.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Space+Grotesk:wght@300;400;600;700&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Space Grotesk', sans-serif;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 25%, #16213e 50%, #0f3460 75%, #533483 100%);
            background-size: 400% 400%;
            animation: oceanFlow 15s ease infinite;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }
        
        @keyframes oceanFlow {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        
        /* 几何图形背景 */
        .geometric-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }
        
        .geometric-shape {
            position: absolute;
            border: 2px solid rgba(0, 255, 255, 0.1);
            animation: float 20s infinite linear;
        }
        
        .shape-1 {
            width: 100px;
            height: 100px;
            top: 10%;
            left: 10%;
            animation-delay: 0s;
            transform: rotate(45deg);
        }
        
        .shape-2 {
            width: 150px;
            height: 150px;
            top: 60%;
            right: 15%;
            animation-delay: -5s;
            border-radius: 50%;
        }
        
        .shape-3 {
            width: 80px;
            height: 80px;
            bottom: 20%;
            left: 20%;
            animation-delay: -10s;
            clip-path: polygon(50% 0%, 0% 100%, 100% 100%);
        }
        
        .shape-4 {
            width: 120px;
            height: 120px;
            top: 30%;
            right: 30%;
            animation-delay: -15s;
            transform: rotate(30deg);
        }
        
        @keyframes float {
            0% { transform: translateY(0px) rotate(0deg); opacity: 0.3; }
            50% { transform: translateY(-20px) rotate(180deg); opacity: 0.1; }
            100% { transform: translateY(0px) rotate(360deg); opacity: 0.3; }
        }
        
        /* 主容器 */
        .main-container {
            position: relative;
            z-index: 10;
            text-align: center;
            padding: 2rem;
        }
        
        /* 标题样式 */
        .main-title {
            font-family: 'Orbitron', monospace;
            font-size: clamp(3rem, 8vw, 8rem);
            font-weight: 900;
            background: linear-gradient(45deg, #00d4ff, #0099cc, #0066ff, #00ffff);
            background-size: 300% 300%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: titleGlow 3s ease-in-out infinite alternate, titleWave 4s ease-in-out infinite;
            margin-bottom: 1rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            filter: drop-shadow(0 0 20px rgba(0, 212, 255, 0.5));
        }
        
        @keyframes titleGlow {
            0% { background-position: 0% 50%; }
            100% { background-position: 100% 50%; }
        }
        
        @keyframes titleWave {
            0%, 100% { transform: translateY(0px) scale(1); }
            50% { transform: translateY(-10px) scale(1.02); }
        }
        
        .subtitle {
            font-size: clamp(1rem, 3vw, 2rem);
            font-weight: 300;
            color: rgba(255, 255, 255, 0.8);
            margin-bottom: 3rem;
            animation: subtitleFade 2s ease-out;
            letter-spacing: 0.2em;
            text-transform: uppercase;
        }
        
        @keyframes subtitleFade {
            0% { opacity: 0; transform: translateY(30px); }
            100% { opacity: 1; transform: translateY(0); }
        }
        
        /* SVG容器 */
        .svg-container {
            position: relative;
            display: inline-block;
            filter: drop-shadow(0 0 30px rgba(0, 212, 255, 0.3));
            animation: svgPulse 4s ease-in-out infinite;
        }
        
        @keyframes svgPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        
        svg {
            max-width: 100%;
            max-height: 60vh;
            transition: all 0.3s ease;
        }
        
        svg:hover {
            filter: drop-shadow(0 0 50px rgba(0, 212, 255, 0.6));
            transform: scale(1.02);
        }
        
        /* 粒子效果 */
        .particles {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 2;
        }
        
        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: rgba(0, 255, 255, 0.6);
            border-radius: 50%;
            animation: particleFloat 15s infinite linear;
        }
        
        @keyframes particleFloat {
            0% { transform: translateY(100vh) translateX(0px); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-100vh) translateX(100px); opacity: 0; }
        }
        
        /* 初始化样式 */
        #elements path {
            stroke-dasharray: 1;
            stroke-dashoffset: 1;
            opacity: 0;
        }
        
        #logo {
            opacity: 0;
        }
        
        /* 响应式设计 */
        @media (max-width: 768px) {
            .main-title {
                font-size: clamp(2rem, 10vw, 4rem);
            }
            
            .subtitle {
                font-size: clamp(0.8rem, 4vw, 1.2rem);
            }
            
            svg {
                max-height: 40vh;
            }
        }
    </style>
</head>

    <script>
        // 创建粒子效果
        function createParticles() {
            const particlesContainer = document.getElementById('particles');
            const particleCount = 50;
            
            for (let i = 0; i < particleCount; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.animationDelay = Math.random() * 15 + 's';
                particle.style.animationDuration = (Math.random() * 10 + 10) + 's';
                particlesContainer.appendChild(particle);
            }
        }
        
        // 等待页面加载完成
        document.addEventListener('DOMContentLoaded', function() {
            // 创建粒子
            createParticles();
            
            // 注册插件
            gsap.registerPlugin(MotionPathPlugin);
            
            // 获取元素
            const elements = document.querySelectorAll('#elements path');
            const logo = document.getElementById('logo');
            
            // 创建时间线
            const tl = gsap.timeline({
                defaults: {
                    ease: 'power2.inOut',
                    duration: 1.5
                }
            });
            
            // 1. 空白画面（保持短暂时间）
            tl.to({}, { duration: 0.5 });
            
            // 2. 逐一绘制基础元素
            elements.forEach((path, index) => {
                // 获取路径长度用于动画
                const pathLength = path.getTotalLength();
                
                // 设置路径的stroke-dasharray和stroke-dashoffset
                path.style.strokeDasharray = pathLength;
                path.style.strokeDashoffset = pathLength;
                path.style.opacity = '1';
                
                // 添加绘制动画
                tl.to(path, {
                    strokeDashoffset: 0,
                    duration: 1.5,
                    ease: 'power3.inOut',
                    delay: index * -0.5 // 每个元素之间的延迟
                });
            });
            
            // 3. logo渐渐显现
            tl.to(logo, {
                opacity: 1,
                duration: 2.5,
                ease: "sine.inOut" 
            }); // 与上一个动画重叠0.5秒
            
            // 4. 最后隐藏基础元素
            tl.to('#elements', {
                opacity: 0,
                duration: 2.5,
                ease: "sine.inOut"
            }, "-=2.5");
            
            // 添加额外的动画效果
            // 标题动画
            gsap.fromTo('.main-title', 
                { opacity: 0, y: 50 },
                { opacity: 1, y: 0, duration: 2, ease: "power2.out", delay: 1 }
            );
            
            // 副标题动画
            gsap.fromTo('.subtitle', 
                { opacity: 0, y: 30 },
                { opacity: 1, y: 0, duration: 1.5, ease: "power2.out", delay: 1.5 }
            );
            
            // SVG容器动画
            gsap.fromTo('.svg-container', 
                { opacity: 0, scale: 0.8 },
                { opacity: 1, scale: 1, duration: 2, ease: "power2.out", delay: 2 }
            );
        });
        
        // 添加鼠标移动视差效果
        document.addEventListener('mousemove', (e) => {
            const mouseX = e.clientX / window.innerWidth;
            const mouseY = e.clientY / window.innerHeight;
            
            // 为几何图形添加轻微视差
            const shapes = document.querySelectorAll('.geometric-shape');
            shapes.forEach((shape, index) => {
                const speed = (index + 1) * 0.5;
                const x = (mouseX - 0.5) * speed * 20;
                const y = (mouseY - 0.5) * speed * 20;
                shape.style.transform += ` translate(${x}px, ${y}px)`;
            });
            
            // 为标题添加微妙的光影变化
            const title = document.querySelector('.main-title');
            const lightX = mouseX * 100;
            const lightY = mouseY * 100;
            title.style.filter = `drop-shadow(${lightX - 50}px ${lightY - 50}px 20px rgba(0, 212, 255, 0.5))`;
        });
        
        // 添加点击波纹效果
        document.addEventListener('click', (e) => {
            const ripple = document.createElement('div');
            ripple.style.position = 'absolute';
            ripple.style.left = e.clientX + 'px';
            ripple.style.top = e.clientY + 'px';
            ripple.style.width = '0px';
            ripple.style.height = '0px';
            ripple.style.background = 'rgba(0, 255, 255, 0.6)';
            ripple.style.borderRadius = '50%';
            ripple.style.transform = 'translate(-50%, -50%)';
            ripple.style.pointerEvents = 'none';
            ripple.style.animation = 'ripple 0.6s ease-out';
            
            document.body.appendChild(ripple);
            
            setTimeout(() => {
                ripple.remove();
            }, 600);
        });
        
        // 添加波纹动画样式
        const style = document.createElement('style');
        style.textContent = `
            @keyframes ripple {
                0% { width: 0; height: 0; opacity: 1; }
                100% { width: 100px; height: 100px; opacity: 0; }
            }
        `;
        document.head.appendChild(style);
    </script>
